<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YeloVouch Index</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .masonry { column-count: 1; column-gap: 1.5rem; }
        @media (min-width: 640px) { .masonry { column-count: 2; } }
        @media (min-width: 1024px) { .masonry { column-count: 3; } }
        .break-inside { break-inside: avoid; }
    </style>
</head>
<body class="bg-[#0a0d14] text-slate-200 antialiased font-sans min-h-screen pb-24"
      x-data="vouchManager()" x-init="loadData()">

    <header class="border-b border-slate-900 bg-[#0e121f] py-6 px-6">
        <div class="max-w-6xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
            <div>
                <h1 class="text-xl font-bold tracking-tight text-white flex items-center gap-2">
                    YELOVOUCH INDEX <span class="text-xs font-mono font-normal px-2 py-0.5 rounded bg-slate-800 text-slate-400 border border-slate-700/60" x-text="items.length + ' VERIFIED'">0 VERIFIED</span>
                </h1>
                <p class="text-xs text-slate-400 mt-0.5">Global image ledger. Live for anyone visiting your bio link.</p>
                
                <div class="mt-3 flex items-center gap-3">
                    <button @click="showPasswordField = !showPasswordField" x-show="!adminMode"
                            class="text-xs bg-indigo-600 hover:bg-indigo-500 text-white font-bold px-3 py-1.5 rounded-lg transition-all">
                        ⚙ Open Admin Control
                    </button>
                    <button @click="logoutAdmin()" x-show="adminMode" x-cloak
                            class="text-xs bg-red-600 hover:bg-red-500 text-white font-bold px-3 py-1.5 rounded-lg transition-all">
                        ✕ Lock Dashboard
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 mt-6">
        
        <section x-show="showPasswordField && !adminMode" x-transition x-cloak class="mb-6 max-w-sm bg-[#0e121f] border border-slate-800 p-4 rounded-xl">
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Enter System Password</label>
            <div class="flex gap-2">
                <input type="password" x-model="passwordInput" @keydown.enter="submitPassword()" placeholder="••••••••" 
                       class="flex-1 bg-[#07090e] border border-slate-800 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-indigo-500 text-white">
                <button @click="submitPassword()" class="bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold px-3 py-1.5 rounded-lg transition-colors">
                    Verify
                </button>
            </div>
        </section>
        
        <section x-show="adminMode" x-transition x-cloak class="mb-12 bg-[#0e121f] border-2 border-dashed border-indigo-500/30 rounded-2xl p-6">
            <h2 class="text-sm font-bold uppercase tracking-wider text-slate-300 mb-4">Upload New Global Vouch Image</h2>
            
            <div class="flex flex-col md:flex-row gap-6 items-stretch">
                <div class="flex-1 relative border border-slate-800 bg-[#07090e] rounded-xl p-6 flex flex-col items-center justify-center text-center cursor-pointer hover:border-slate-700 transition-colors group">
                    <input type="file" accept="image/*" @change="handleFileSelect" class="absolute inset-0 opacity-0 cursor-pointer z-10" :disabled="uploading" />
                    
                    <template x-if="!selectedFile && !uploading">
                        <div>
                            <svg class="w-8 h-8 text-slate-500 mx-auto mb-2" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                            <p class="text-xs font-medium text-slate-400">Click or drag image file here to select</p>
                        </div>
                    </template>

                    <template x-if="uploading">
                        <div>
                            <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-indigo-500 mx-auto mb-2"></div>
                            <p class="text-xs font-medium text-indigo-400">Syncing with GitHub Backend...</p>
                        </div>
                    </template>
                    
                    <template x-if="selectedFile && !uploading">
                        <div class="w-full flex items-center justify-between gap-4">
                            <span class="text-xs text-emerald-400 font-medium truncate" x-text="selectedFile.name"></span>
                            <button @click.stop="selectedFile = null" class="text-xs text-red-400 hover:underline z-20">Remove</button>
                        </div>
                    </template>
                </div>

                <div class="flex items-end">
                    <button @click="uploadAndSave" :disabled="uploading || !selectedFile" 
                            class="w-full md:w-auto bg-white disabled:bg-slate-800 disabled:text-slate-600 text-slate-950 font-bold text-xs uppercase tracking-wider px-6 py-4 rounded-xl hover:bg-slate-200 transition-all shadow-xl">
                        Publish Live Vouch
                    </button>
                </div>
            </div>
        </section>

        <section class="masonry">
            <template x-for="(item, index) in items" :key="item.id">
                <div class="break-inside bg-[#0e121f] border border-slate-900 rounded-xl overflow-hidden mb-6 group relative transition-all duration-200 hover:border-slate-800">
                    <template x-if="adminMode">
                        <button @click="deleteVouch(item.id)" class="absolute top-3 right-3 z-20 bg-red-500 hover:bg-red-600 text-white p-1.5 rounded-lg shadow-lg transition-colors">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-16v4M4 7h16"></path></svg>
                        </button>
                    </template>
                    <div class="cursor-zoom-in bg-black relative" @click="activeImage = item.image">
                        <img :src="item.image" class="w-full h-auto object-cover max-h-[500px]">
                    </div>
                </div>
            </template>
        </section>

        <template x-if="items.length === 0">
            <div class="text-center py-20 border border-dashed border-slate-900 rounded-2xl bg-slate-900/10">
                <p class="text-sm font-semibold text-slate-500">No live proof snapshots uploaded to ledger index yet.</p>
            </div>
        </template>
    </main>

    <div x-show="activeImage" x-transition x-cloak
         class="fixed inset-0 z-50 bg-black/95 flex items-center justify-center p-4 cursor-zoom-out"
         @click="activeImage = null" @keydown.escape.window="activeImage = null">
        <img :src="activeImage" class="max-w-full max-h-[92vh] rounded-lg shadow-2xl object-contain">
    </div>

    <script>
        function vouchManager() {
            return {
                adminMode: false,
                showPasswordField: false,
                passwordInput: '',
                activeImage: null,
                selectedFile: null,
                uploading: false,
                items: [],
                fileSha: '',
                imgbbKey: '6e4a5b814deef7f5171b255cae31d459',
                
                // ⚙️ BACKEND ROUTING CONFIG
                githubRepo: 'yelovouch-db',
                githubUser: 'xxade2q',

                // Obfuscated string matching 'Yasuomain12'
                scrambledPass: 'WWFzdW9tYWluMTI=', 

                async loadData() {
                    if (localStorage.getItem('yelo_secure_session_v7') === 'true') {
                        this.adminMode = true;
                    }
                    try {
                        let res = await fetch(`https://api.github.com/repos/${this.githubUser}/${this.githubRepo}/contents/db.json`);
                        if (res.ok) {
                            let data = await res.json();
                            this.fileSha = data.sha;
                            let parsed = JSON.parse(atob(data.content));
                            this.items = parsed.vouches || [];
                        }
                    } catch (err) {
                        this.items = [];
                    }
                },

                submitPassword() {
                    if (!this.passwordInput) return;
                    
                    // Instant base64 validation verification step
                    if (btoa(this.passwordInput) === this.scrambledPass) {
                        localStorage.setItem('yelo_secure_session_v7', 'true');
                        this.adminMode = true;
                        this.showPasswordField = false;
                        this.passwordInput = '';
                        alert("Access Granted. Welcome back!");
                    } else {
                        alert("Security Mismatch: Access Denied.");
                        this.passwordInput = '';
                    }
                },

                logoutAdmin() {
                    this.adminMode = false;
                    localStorage.removeItem('yelo_secure_session_v7');
                    this.showPasswordField = false;
                },

                handleFileSelect(e) {
                    this.selectedFile = e.target.files[0];
                },

                async uploadAndSave() {
                    if (!this.selectedFile || !this.adminMode) return;
                    this.uploading = true;

                    try {
                        let formData = new FormData();
                        formData.append('image', this.selectedFile);
                        
                        let imgbbResp = await fetch(`https://api.imgbb.com/1/upload?key=${this.imgbbKey}`, {
                            method: 'POST',
                            body: formData
                        });
                        let imgbbData = await imgbbResp.json();
                        
                        if (imgbbData && imgbbData.success) {
                            this.items.unshift({ id: Date.now(), image: imgbbData.data.url });
                            await this.syncToGitHub();
                            this.selectedFile = null;
                        } else {
                            alert("ImgBB Cloud Upload Failed.");
                        }
                    } catch (error) {
                        alert("Network connection error.");
                    } finally {
                        this.uploading = false;
                    }
                },

                async deleteVouch(id) {
                    if (confirm("Delete this image permanently?")) {
                        this.items = this.items.filter(item => item.id !== id);
                        await this.syncToGitHub();
                    }
                },

                async syncToGitHub() {
                    try {
                        let updatedContent = btoa(JSON.stringify({ vouches: this.items }, null, 2));
                        
                        // Routes securely through your Netlify server backend hidden from F12 tools
                        let res = await fetch('/api/sync', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                user: this.githubUser,
                                repo: this.githubRepo,
                                content: updatedContent,
                                sha: this.fileSha
                            })
                        });
                        
                        if (res.ok) {
                            let data = await res.json();
                            this.fileSha = data.sha;
                            alert("Vouch live across all global devices successfully!");
                        } else {
                            alert("GitHub verification sync failed. Check your Netlify Environment Variable setup.");
                        }
                    } catch(err) {
                        alert("Network storage mismatch.");
                    }
                }
            }
        }
    </script>
</body>
</html>
